<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>mamalog</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="mamalog">
<meta name="theme-color" content="#B8756A">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFDF9;
    --blush: #F2E8DF;
    --rose: #D4A89A;
    --rose-deep: #B8756A;
    --sage: #8FA68A;
    --text: #3D3530;
    --text-light: #8A7A74;
    --border: #E8DDD5;
    --ai-bg: #F5F0EB;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* AUTH SCREEN */
  #authScreen {
    position: fixed; inset: 0;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 40px 24px;
    overflow-y: auto;
  }
  #authScreen.hidden { display: none; }
  .auth-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 28px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .auth-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--rose-deep);
    margin-bottom: 6px;
  }
  .auth-logo span { font-style: italic; }
  .auth-tagline {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 32px;
    line-height: 1.8;
  }
  .auth-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--sage);
    text-align: left;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .auth-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    background: var(--cream);
    color: var(--text);
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .auth-input:focus { border-color: var(--rose); }
  .auth-btn {
    width: 100%;
    padding: 16px;
    background: var(--rose-deep);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .auth-btn:hover { background: #a0635a; }
  .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .auth-error {
    font-size: 12px;
    color: #c0392b;
    margin-bottom: 12px;
    min-height: 18px;
  }
  .auth-toggle {
    font-size: 13px;
    color: var(--text-light);
    margin-top: 20px;
    line-height: 1.7;
  }
  .auth-toggle a {
    color: var(--rose-deep);
    text-decoration: none;
    font-weight: 500;
  }

  /* BIRTHDAY SCREEN */
  #birthdayScreen {
    position: fixed; inset: 0;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99;
    padding: 40px 24px;
    overflow-y: auto;
  }
  #birthdayScreen.hidden { display: none; }
  .birthday-preview {
    font-size: 13px;
    color: var(--rose-deep);
    margin-bottom: 16px;
    min-height: 20px;
    text-align: center;
  }

  /* MAIN APP */
  #app { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
  #app.visible { display: flex; }

  .header {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--rose-deep); }
  .logo span { font-style: italic; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .age-badge {
    font-size: 11px;
    background: var(--blush);
    color: var(--rose-deep);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .logout-btn {
    font-size: 11px;
    color: var(--text-light);
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 28px;
  }

  .tab-nav {
    display: flex;
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    flex: 1; padding: 10px; text-align: center;
    font-size: 13px; color: var(--text-light);
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: color 0.2s; letter-spacing: 0.05em;
    min-height: 44px;
    display: flex; align-items: center; justify-content: center;
  }
  .tab.active { color: var(--rose-deep); border-bottom-color: var(--rose-deep); font-weight: 500; }

  .view { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
  .view.active { display: flex; }

  /* CHAT */
  .chat-counter {
    text-align: center;
    font-size: 11px;
    color: var(--text-light);
    padding: 6px 0 0;
    flex-shrink: 0;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 0;
  }
  .messages::after {
    content: '';
    display: block;
    height: 4px;
    flex-shrink: 0;
  }
  .msg { display: flex; gap: 8px; animation: fadeUp 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 14px; background: var(--blush);
    margin-top: 2px;
  }
  .msg.user .avatar { background: var(--rose); }
  .bubble {
    max-width: 78%; padding: 10px 14px;
    border-radius: 18px; font-size: 14px; line-height: 1.75;
    word-break: break-word;
  }
  .msg.ai .bubble { background: var(--ai-bg); border-top-left-radius: 4px; }
  .msg.user .bubble { background: var(--rose-deep); border-top-right-radius: 4px; color: white; }
  .typing-dots { display:flex; gap:5px; padding:6px 0; align-items:center; }
  .dot { width:7px;height:7px;border-radius:50%;background:var(--rose);animation:bounce 1.2s infinite; }
  .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

  /* INPUT AREA - fixed at bottom */
  .input-area {
    background: var(--warm-white);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    padding-bottom: max(10px, var(--safe-bottom));
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  textarea {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 22px;
    padding: 12px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    resize: none;
    outline: none;
    background: var(--cream);
    color: var(--text);
    line-height: 1.5;
    min-height: 48px;
    max-height: 120px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  textarea:focus { border-color: var(--rose); }
  textarea::placeholder { color: var(--text-light); }
  .send-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--rose-deep);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .send-btn svg { fill: white; width: 22px; height: 22px; }

  /* DIARY */
  .diary-scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    padding: 12px;
  }
  .diary-empty { text-align:center; padding:40px 20px; color:var(--text-light); }
  .diary-empty .icon { font-size:40px; margin-bottom:12px; }
  .diary-empty p { font-size:13px; line-height:1.8; }

  /* Calendar */
  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .cal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px; color: var(--rose-deep);
  }
  .cal-nav {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--warm-white);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; color: var(--text-light);
    touch-action: manipulation;
  }
  .cal-nav:active { background: var(--blush); }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px; margin-bottom: 16px;
  }
  .cal-dow {
    text-align: center; font-size: 10px; color: var(--text-light);
    padding: 4px 0; font-weight: 500;
  }
  .cal-day {
    aspect-ratio: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 10px; font-size: 13px; color: var(--text);
    cursor: pointer; position: relative;
    touch-action: manipulation;
  }
  .cal-day.other { color: var(--border); }
  .cal-day.today { background: var(--blush); font-weight: 500; }
  .cal-day.selected { background: var(--rose-deep); color: white; }
  .cal-day.selected .cal-dot { background: white; }
  .cal-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--rose); position: absolute; bottom: 4px;
  }

  /* Entry detail */
  .diary-entry {
    background:var(--warm-white); border:1px solid var(--border);
    border-radius:12px; padding:16px; margin-bottom:14px;
    animation:fadeUp 0.3s ease;
  }
  .entry-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .entry-date { font-family:'DM Serif Display',serif; font-size:15px; color:var(--rose-deep); }
  .entry-age { font-size:11px; color:var(--text-light); background:var(--blush); padding:2px 8px; border-radius:10px; }
  .entry-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .tag { font-size:10px; padding:2px 8px; border-radius:10px; background:var(--blush); color:var(--rose-deep); }
  .entry-summary { font-family:'Noto Serif JP',serif; font-size:13px; line-height:1.9; color:var(--text); border-left:2px solid var(--rose); padding-left:12px; margin-bottom:10px; font-weight:300; }
  .entry-q { font-size:12px; color:var(--text-light); line-height:1.6; margin-bottom:10px; }
  .entry-q strong { display:block; font-size:10px; letter-spacing:.05em; color:var(--sage); margin-bottom:4px; font-family:'Noto Sans JP',sans-serif; font-weight:500; }
  .no-entry { text-align:center; padding:20px; color:var(--text-light); font-size:13px; }
  ::-webkit-scrollbar { width:0; background:transparent; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo"><span>mama</span>log</div>
    <p class="auth-tagline">育児のこと、<br>ここに残そう。</p>
    <form id="authForm" data-mode="login" onsubmit="handleAuth(event)">
      <div class="auth-label">メールアドレス</div>
      <input type="email" id="authEmail" class="auth-input" placeholder="mail@example.com" required>
      <div class="auth-label">パスワード</div>
      <input type="password" id="authPassword" class="auth-input" placeholder="6文字以上" required minlength="6">
      <div id="authError" class="auth-error"></div>
      <button type="submit" id="authSubmitBtn" class="auth-btn">ログイン</button>
    </form>
    <p id="authToggle" class="auth-toggle">
      初めての方は <a href="#" onclick="toggleAuthMode();return false">新規登録</a>
    </p>
  </div>
</div>

<!-- BIRTHDAY SCREEN -->
<div id="birthdayScreen" class="hidden">
  <div class="auth-card">
    <div class="auth-logo"><span>mama</span>log</div>
    <p class="auth-tagline">お子さんの誕生日を<br>教えてください</p>
    <form onsubmit="saveBirthday(event)">
      <div class="auth-label">誕生日</div>
      <input type="date" id="birthdayInput" class="auth-input" required>
      <div id="birthdayPreview" class="birthday-preview"></div>
      <button type="submit" id="birthdayBtn" class="auth-btn">はじめる</button>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="header">
    <div class="logo"><span>mama</span>log</div>
    <div class="header-right">
      <span class="age-badge" id="ageBadge">👶 月齢未設定</span>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </div>
  <div class="tab-nav">
    <div class="tab active" id="tabChat" onclick="switchTab('chat')">💬 話す</div>
    <div class="tab" id="tabDiary" onclick="switchTab('diary')">📖 日記</div>
  </div>

  <div class="view active" id="chatView">
    <div class="chat-counter" id="chatCounter"></div>
    <div class="messages" id="messages">
      <div class="msg ai">
        <div class="avatar">🌱</div>
        <div class="bubble">こんにちは。育児のこと、なんでも話しかけてください。<br>質問でも、不安なことでも、ただのつぶやきでも。</div>
      </div>
    </div>
    <div class="input-area">
      <textarea id="userInput" rows="1" placeholder="ここにメッセージを入力"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div class="view" id="diaryView">
    <div class="diary-scroll" id="diaryScroll">
      <div class="diary-empty">
        <div class="icon">🌸</div>
        <p>会話すると自動で日記になります。<br><br>まず「話す」タブで<br>話しかけてみて。</p>
      </div>
    </div>
  </div>
</div>

<script>
/* ========== Supabase ========== */
const SUPABASE_URL = 'https://jgbrrumlykotyfmzewqo.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_8codbQvWELeOgEMqofoLew_dDazNRP_';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ========== Claude API ========== */
const SYSTEM = `あなたは「mamalog」という育児日記アプリのAIです。パパ・ママの育児の悩みや不安、喜びに寄り添います。

大切にすること：
- まず共感する。「それは不安だよね」「大変だったね」と受け止める
- 医療的な内容には「心配なら小児科へ」を添える
- 難しい言葉は使わない。短く、やさしく
- 子どもの月齢を把握して文脈に合わせる`;

/* ========== State ========== */
let history = [];
let diaryEntries = [];
let childAge = null;
let childBirthday = null;
let topics = new Set();
let busy = false;
let chatCount = 0;
let currentUser = null;
let calYear, calMonth, calSelected; // calendar state

/* ========== Auth ========== */
async function initAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    showApp();
  }

  sb.auth.onAuthStateChange((_event, session) => {
    if (session) {
      currentUser = session.user;
      showApp();
    } else {
      currentUser = null;
      showAuthScreen();
    }
  });
}

function calcMonthAge(birthday) {
  const now = new Date();
  const b = new Date(birthday);
  let months = (now.getFullYear() - b.getFullYear()) * 12 + (now.getMonth() - b.getMonth());
  if (now.getDate() < b.getDate()) months--;
  return Math.max(0, months);
}

function updateAgeBadge() {
  if (childBirthday) {
    childAge = calcMonthAge(childBirthday);
    document.getElementById('ageBadge').textContent = `👶 生後${childAge}ヶ月`;
  }
}

function showApp() {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('birthdayScreen').classList.add('hidden');

  // Check if birthday is saved
  const bd = currentUser.user_metadata?.child_birthday;
  if (!bd) {
    showBirthdayScreen();
    return;
  }

  childBirthday = bd;
  updateAgeBadge();
  document.getElementById('app').classList.add('visible');
  loadDiaryEntries();
  document.getElementById('userInput').focus();
}

function showBirthdayScreen() {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('birthdayScreen').classList.remove('hidden');

  const input = document.getElementById('birthdayInput');
  const preview = document.getElementById('birthdayPreview');
  input.value = '';
  preview.textContent = '';
  input.addEventListener('input', () => {
    if (input.value) {
      const age = calcMonthAge(input.value);
      preview.textContent = `生後${age}ヶ月`;
    } else {
      preview.textContent = '';
    }
  });
}

async function saveBirthday(e) {
  e.preventDefault();
  const input = document.getElementById('birthdayInput');
  const btn = document.getElementById('birthdayBtn');
  if (!input.value) return;

  btn.disabled = true;
  btn.textContent = '保存中...';

  const { error } = await sb.auth.updateUser({
    data: { child_birthday: input.value }
  });

  if (error) {
    btn.disabled = false;
    btn.textContent = 'はじめる';
    return;
  }

  // Refresh user data
  const { data: { user } } = await sb.auth.getUser();
  currentUser = user;
  showApp();
}

function showAuthScreen() {
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('birthdayScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('visible');
}

function toggleAuthMode() {
  const form = document.getElementById('authForm');
  const isLogin = form.dataset.mode === 'login';
  form.dataset.mode = isLogin ? 'signup' : 'login';
  document.getElementById('authSubmitBtn').textContent = isLogin ? '新規登録' : 'ログイン';
  document.getElementById('authToggle').innerHTML = isLogin
    ? 'アカウントをお持ちの方は <a href="#" onclick="toggleAuthMode();return false">ログイン</a>'
    : '初めての方は <a href="#" onclick="toggleAuthMode();return false">新規登録</a>';
  document.getElementById('authError').textContent = '';
}

async function handleAuth(e) {
  e.preventDefault();
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errorEl = document.getElementById('authError');
  const btn = document.getElementById('authSubmitBtn');
  const mode = document.getElementById('authForm').dataset.mode;

  errorEl.textContent = '';
  btn.disabled = true;
  const originalLabel = btn.textContent;
  btn.textContent = '処理中...';

  try {
    let result;
    if (mode === 'signup') {
      result = await sb.auth.signUp({ email, password });
    } else {
      result = await sb.auth.signInWithPassword({ email, password });
    }

    if (result.error) {
      errorEl.textContent = result.error.message;
    }
  } catch (err) {
    errorEl.textContent = '通信エラーが発生しました';
  }

  btn.disabled = false;
  btn.textContent = originalLabel;
}

async function logout() {
  await sb.auth.signOut();
  history = [];
  diaryEntries = [];
  childAge = null;
  childBirthday = null;
  topics.clear();
  // Reset chat UI
  document.getElementById('messages').innerHTML = `
    <div class="msg ai">
      <div class="avatar">🌱</div>
      <div class="bubble">こんにちは。育児のこと、なんでも話しかけてください。<br>質問でも、不安なことでも、ただのつぶやきでも。</div>
    </div>`;
  document.getElementById('ageBadge').textContent = '👶 月齢未設定';
  switchTab('chat');
}

/* ========== Diary (Supabase) ========== */
async function loadDiaryEntries() {
  const { data, error } = await sb
    .from('diary_entries')
    .select('*')
    .order('created_at', { ascending: false });

  if (!error && data) {
    diaryEntries = data.map(e => ({
      id: e.id,
      date: new Date(e.created_at),
      age: e.child_age,
      topics: e.topics || [],
      summary: e.summary,
      question: e.question
    }));
  }
}

function todayRange() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
  const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).toISOString();
  return { start, end };
}

async function saveDiaryToSupabase(entry) {
  const { start, end } = todayRange();

  // Check if today's entry already exists
  const { data: existing } = await sb
    .from('diary_entries')
    .select('id')
    .eq('user_id', currentUser.id)
    .gte('created_at', start)
    .lt('created_at', end)
    .limit(1);

  const row = {
    summary: entry.summary,
    question: entry.question,
    child_age: entry.age || null,
    topics: entry.topics || []
  };

  let error;
  if (existing && existing.length > 0) {
    ({ error } = await sb
      .from('diary_entries')
      .update(row)
      .eq('id', existing[0].id));
  } else {
    ({ error } = await sb
      .from('diary_entries')
      .insert({ user_id: currentUser.id, ...row }));
  }

  if (error) console.warn('diary save failed', error);
}

/* ========== Tabs ========== */
function switchTab(t) {
  document.getElementById('tabChat').classList.toggle('active', t==='chat');
  document.getElementById('tabDiary').classList.toggle('active', t==='diary');
  document.getElementById('chatView').classList.toggle('active', t==='chat');
  document.getElementById('diaryView').classList.toggle('active', t==='diary');
  if(t==='diary') renderDiary();
}

/* ========== Chat ========== */
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
}

function scrollToBottom() {
  const wrap = document.getElementById('messages');
  if (wrap) wrap.scrollTop = wrap.scrollHeight;
}

function appendMsg(role, text) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="avatar">${role==='user'?'👩':'🌱'}</div><div class="bubble">${text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>`;
  wrap.appendChild(div);
  requestAnimationFrame(scrollToBottom);
}

function showTyping() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className='msg ai'; div.id='typing';
  div.innerHTML=`<div class="avatar">🌱</div><div class="bubble"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  wrap.appendChild(div);
  requestAnimationFrame(scrollToBottom);
}

function removeTyping() { const t=document.getElementById('typing'); if(t)t.remove(); }

function detectContext(text) {
  const map = {
    '睡眠':['眠れ','夜泣き','寝な','寝かしつけ','起き'],
    '食事':['食べ','離乳食','ミルク','授乳','母乳'],
    '発達':['歩','言葉','発達','できない','話さ'],
    '体調':['熱','咳','鼻水','病院','受診'],
    '気持ち':['不安','辛い','疲れ','しんどい','泣きそう','つらい']
  };
  for(const [k,vs] of Object.entries(map)){
    if(vs.some(v=>text.includes(v))) topics.add(k);
  }
}

async function callClaude(messages, maxTokens=1000) {
  const res = await fetch('/.netlify/functions/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system: SYSTEM,
      messages,
      max_tokens: maxTokens
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text || '';
}

async function sendMessage() {
  const el = document.getElementById('userInput');
  const text = el.value.trim();
  if(!text || busy) return;
  el.value=''; el.style.height='auto';
  busy=true; document.getElementById('sendBtn').disabled=true;

  appendMsg('user', text);
  detectContext(text);
  history.push({role:'user', content:text});
  showTyping();

  try {
    const reply = await callClaude(history);
    removeTyping();
    appendMsg('ai', reply);
    history.push({role:'assistant', content:reply});
    chatCount++;
    document.getElementById('chatCounter').textContent = `今日 ${chatCount}回話しました`;
    detectContext(reply);
    if(history.length >= 2) await autoSave();
  } catch(e) {
    removeTyping();
    appendMsg('ai', `エラーが起きました: ${e.message}`);
  }

  busy=false; document.getElementById('sendBtn').disabled=false;
  document.getElementById('userInput').focus();
}

/* ========== Diary Save ========== */
async function autoSave() {
  const conv = history.map(m=>`${m.role==='user'?'親':'AI'}: ${m.content}`).join('\n');
  const prompt = `以下は今日の育児相談の会話すべてです。1日分の日記エントリとしてまとめてください。JSONのみで返答（マークダウン不要）：
{"summary":"この日感じたこと（100文字以内、親目線）","question":"今日聞いたこと（30文字以内）"}

会話：
${conv}`;

  try {
    const raw = await callClaude([{role:'user',content:prompt}], 400);
    const clean = raw.replace(/```json|```/g,'').trim();
    const entry = JSON.parse(clean);
    const diaryData = {
      age: childAge,
      topics: Array.from(topics),
      ...entry
    };

    await saveDiaryToSupabase(diaryData);
    await loadDiaryEntries();
  } catch(e){ console.warn('diary save failed', e); }
}

async function manualSave() {
  const btn = document.querySelector('.save-btn');
  if(btn){ btn.textContent='保存中...'; btn.disabled=true; }
  await autoSave();
  renderDiary();
}

/* ========== Diary Render (Calendar) ========== */
function entryDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function buildEntryMap() {
  const map = {};
  diaryEntries.forEach(e => { map[entryDateKey(e.date)] = e; });
  return map;
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  calSelected = null;
  renderDiary();
}

function selectDay(key) {
  calSelected = key;
  renderDiary();
}

function renderDiary() {
  const el = document.getElementById('diaryScroll');
  if (!calYear) {
    const now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth();
  }

  const map = buildEntryMap();
  const today = entryDateKey(new Date());
  const dows = ['日','月','火','水','木','金','土'];

  // First day / last day of current month
  const first = new Date(calYear, calMonth, 1);
  const last = new Date(calYear, calMonth + 1, 0);
  const startDow = first.getDay();

  let html = `
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">◀</button>
      <div class="cal-title">${calYear}年${calMonth+1}月</div>
      <button class="cal-nav" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-grid">
      ${dows.map(d => `<div class="cal-dow">${d}</div>`).join('')}`;

  // Previous month padding
  const prevLast = new Date(calYear, calMonth, 0).getDate();
  for (let i = startDow - 1; i >= 0; i--) {
    const day = prevLast - i;
    html += `<div class="cal-day other">${day}</div>`;
  }

  // Current month days
  for (let d = 1; d <= last.getDate(); d++) {
    const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasEntry = map[key];
    const isToday = key === today;
    const isSel = key === calSelected;
    const cls = ['cal-day'];
    if (isToday) cls.push('today');
    if (isSel) cls.push('selected');
    html += `<div class="${cls.join(' ')}" onclick="selectDay('${key}')">${d}${hasEntry ? '<div class="cal-dot"></div>' : ''}</div>`;
  }

  // Next month padding
  const totalCells = startDow + last.getDate();
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="cal-day other">${i}</div>`;
  }

  html += '</div>';

  // Show selected day's entry
  if (calSelected && map[calSelected]) {
    const e = map[calSelected];
    const d = e.date;
    const ds = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
    html += `<div class="diary-entry">
      <div class="entry-header">
        <div class="entry-date">${ds}</div>
        ${e.age ? `<div class="entry-age">生後${e.age}ヶ月</div>` : ''}
      </div>
      ${e.topics?.length ? `<div class="entry-tags">${e.topics.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
      ${e.summary ? `<div class="entry-summary">${e.summary}</div>` : ''}
      ${e.question ? `<div class="entry-q"><strong>きょう聞いたこと</strong>${e.question}</div>` : ''}
    </div>`;
  } else if (calSelected) {
    html += '<div class="no-entry">この日の日記はありません</div>';
  }

  el.innerHTML = html;
}

/* ========== Viewport / Keyboard handling ========== */
(function() {
  const vv = window.visualViewport;
  if (!vv) return;

  function onViewportChange() {
    // Resize body to match visual viewport (handles keyboard open/close)
    document.body.style.height = vv.height + 'px';
    // Prevent page from scrolling behind keyboard
    window.scrollTo(0, 0);
    requestAnimationFrame(scrollToBottom);
  }

  vv.addEventListener('resize', onViewportChange);
  vv.addEventListener('scroll', () => window.scrollTo(0, 0));
})();

/* ========== Init ========== */
window.onload = () => {
  initAuth();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
};
